<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Bean Run</title>
  <meta name="description" content="This page ran a little too far. Head back to Bean Run — the free endless arcade runner built with Python and Pygame." />
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#060912" />
  <link rel="canonical" href="https://mr-bean-run.vercel.app/" />

  <link rel="icon" href="/assets/icon.ico" sizes="any" />
  <link rel="shortcut icon" href="/assets/icon.ico" />
  <link rel="apple-touch-icon" href="/assets/icon.ico" />
  <link rel="manifest" href="/site.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/style.css" />

  <style>
    /* Reuses the site's tokens — no new palette introduced */
    .err {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 40px 20px;
      position: relative;
      z-index: 2;
    }
    .err__inner { max-width: 560px; }
    .err__code {
      font-family: "Sora", sans-serif;
      font-weight: 800;
      font-size: clamp(4.5rem, 18vw, 9rem);
      line-height: 1;
      background: linear-gradient(120deg, #6aa6ff, #2f6bff 60%, #46d6ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 6px 30px rgba(47,107,255,.45));
    }
    .err__title { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 800; margin: 10px 0 14px; }
    .err__text { color: var(--text-dim); font-size: 1.05rem; margin-bottom: 30px; }
    .err__actions { display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; }
  </style>
</head>
<body>
  <canvas id="particles" aria-hidden="true"></canvas>

  <main class="err">
    <div class="err__inner">
      <p class="err__code">404</p>
      <h1 class="err__title">This page ran too far</h1>
      <p class="err__text">
        The page you're looking for dodged out of sight. Let's get you back to
        <strong>Bean Run</strong> — the free endless arcade runner.
      </p>
      <div class="err__actions">
        <a href="/" class="btn btn--primary ripple" data-glow>Back to Home</a>
        <a href="/#download" class="btn btn--glass ripple">Download the Game</a>
      </div>
    </div>
  </main>

  <script src="/script.js"></script>
</body>
</html>
